# Default Evaluator Profile
# Balanced evaluation for standard development

profile:
  name: default
  description: "Balanced evaluation for standard development"

  dimensions:
    functionality:
      weight: 0.40
      pass_threshold: 0.70
      must_pass: true
    security:
      weight: 0.25
      pass_threshold: 0.80
      must_pass: true
    craft:
      weight: 0.20
      pass_threshold: 0.65
      must_pass: false
    consistency:
      weight: 0.15
      pass_threshold: 0.60
      must_pass: false

  overall_pass_threshold: 0.75
  max_iterations: 5
  escalation_after: 3
  improvement_threshold: 0.05
